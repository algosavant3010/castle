[build]
  command = "npm run build"
  publish = ".next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- app/ components/ lib/ hooks/ public/ package.json next.config.ts tsconfig.json tailwind.config.ts postcss.config.mjs netlify.toml .npmrc"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps --include=dev"

# Next.js on Netlify uses @netlify/plugin-nextjs automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"
